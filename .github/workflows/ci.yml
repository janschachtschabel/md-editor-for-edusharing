name: CI — Build & Test

# Fast sanity checks before the Docker build:
# - both esbuild bundles compile (web component + host page)
# - full test suite passes (markdown round trip, save-bar logic, guards,
#   session store, API auth integration against a mocked edu-sharing)
# Runs on every push + PR to main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Node 24 as the action runtime — Node 20 is being removed from
  # GitHub runners starting Q3 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    name: Build bundles + run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 22 LTS — matches the Dockerfile base image (node:22-alpine)
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build bundles
        run: npm run build

      - name: Verify bundles
        run: |
          test -f public/md-collab-editor.js || (echo "md-collab-editor.js missing" && exit 1)
          test -f public/host.bundle.js || (echo "host.bundle.js missing" && exit 1)
          echo "OK: bundles built"
          ls -la public/*.js

      - name: Run tests
        # 9 suites: roundtrip, annotations, entity-types, save-state, guards,
        # sessions, api-auth (spawns the real server against a mock repo),
        # i18n key parity, annotation-ui (jsdom)
        run: npm test
